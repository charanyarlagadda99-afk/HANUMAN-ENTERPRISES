<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Hanuman Enterprises, GST 37CJTPJ8744A1ZU, transforms wood waste into eco-friendly biomass fuel bricks for hotels, restaurants, bakeries, industrial kitchens, and commercial businesses in Anakapalli District."
    />
    <meta
      name="keywords"
      content="Hanuman Enterprises, biomass fuel bricks, wood waste recycling, eco-friendly briquettes, biomass briquettes, sustainable fuel, commercial kitchen fuel"
    />
    <meta property="og:title" content="Hanuman Enterprises | Eco-Friendly Biomass Fuel Bricks" />
    <meta
      property="og:description"
      content="Reliable biomass fuel bricks made from recycled wood waste. Located at Kondakarla Village, Atchutapuram Mandal, Anakapalli District - 531033."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/hero-biomass-production.png" />
    <title>Hanuman Enterprises | Biomass Fuel Bricks from Wood Waste</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        try {
          const setDefaultUserPlan = () => {
            try {
              const wrap = (obj) => {
                if (!obj || obj.__configCatPatched) return;
                obj.__configCatPatched = true;
                if (typeof obj.getValue === 'function') {
                  const orig = obj.getValue.bind(obj);
                  obj.getValue = function(key, defaultValue, user, ...rest){
                    if (!user) user = { identifier: 'anon', custom: { plan: 'free' } };
                    else if (user && !user.custom) user.custom = { plan: 'free' };
                    else if (user && user.custom && user.custom.plan === undefined) user.custom.plan = 'free';
                    return orig(key, defaultValue, user, ...rest);
                  };
                }
              };

              if (window.configcat) wrap(window.configcat);
              if (window.ConfigCatClient) wrap(window.ConfigCatClient);
              if (window.configcatClient) wrap(window.configcatClient);
              if (window.ConfigCat && window.ConfigCat.prototype) wrap(window.ConfigCat.prototype);
            } catch (e) {
              // swallow errors
            }
          };

          setDefaultUserPlan();
          if (document.readyState === 'loading') {
            window.addEventListener('load', setDefaultUserPlan);
          } else {
            setTimeout(setDefaultUserPlan, 0);
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
